name: Generate Resume PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Generate PDF
        run: PDF_OUTPUT_PATH=/tmp/resume.pdf bun run gen

      - name: Publish to outputs branch
        run: |
          DATE=$(date -u +%Y-%m-%d)
          FILENAME="${DATE}-resume.pdf"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/outputs; then
            git checkout -B outputs origin/outputs
          else
            git checkout --orphan outputs
            git rm -rf . --quiet
          fi

          cp /tmp/resume.pdf "${FILENAME}"
          git add "${FILENAME}"

          if git diff --cached --quiet; then
            echo "PDF unchanged, skipping commit"
          else
            git commit -m "${DATE}"
            git push origin outputs
          fi
