name: Build Resume PDF And Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and export static site
        run: |
          bun run build

      - name: Install Playwright + Chromium
        run: |
          bun add --no-save playwright
          bunx playwright install --with-deps chromium

      - name: Export PDF
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"
          if [ "${REPO_NAME,,}" = "${OWNER_NAME,,}.github.io" ]; then
            PAGE_PREFIX=""
            SERVE_DIR="out"
          else
            PAGE_PREFIX="/${REPO_NAME}"
            SERVE_DIR="/tmp/pages-preview"
            mkdir -p "${SERVE_DIR}"
            rm -rf "${SERVE_DIR}/${REPO_NAME}"
            ln -s "${GITHUB_WORKSPACE}/out" "${SERVE_DIR}/${REPO_NAME}"
          fi

          python3 -m http.server 4173 --directory "${SERVE_DIR}" >/tmp/resume-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          PDF_SOURCE_URL="http://127.0.0.1:4173${PAGE_PREFIX}/" bun scripts/export-pdf.mjs
          ls -lh out/resume.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
